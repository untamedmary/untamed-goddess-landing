<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untamed Goddess</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .landing {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-photo {
            position: absolute;
            z-index: 5;
        }

        .text-overlay {
            position: absolute;
            z-index: 8;
        }

        .button-cta {
            position: absolute;
            bottom: 2rem;
            z-index: 20;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .button-cta:hover {
            transform: scale(1.05);
        }

        .button-cta img {
            display: block;
            width: 100%;
        }

        /* DESKTOP */
        @media (min-width: 1024px) {
            .hero-photo {
                left: 5%;
                top: 50%;
                transform: translateY(-50%);
                width: 35%;
                max-width: 400px;
            }

            .hero-photo img {
                width: 100%;
                height: auto;
            }

            #text-principal {
                top: 12%;
                left: 50%;
                transform: translateX(-50%);
                width: 50%;
            }

            #text-descriptivo {
                top: 48%;
                left: 50%;
                transform: translateX(-50%);
                width: 50%;
            }

            #text-lateral {
                right: 1%;
                top: 30%;
                height: 50%;
            }

            #text-lateral img {
                height: 100%;
                width: auto;
            }

            .button-cta {
                width: 400px;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        /* MOBILE */
        @media (max-width: 1023px) {
            .hero-photo {
                left: 50%;
                top: 20%;
                transform: translateX(-50%);
                width: 70%;
                max-width: 280px;
            }

            .hero-photo img {
                width: 100%;
                height: auto;
            }

            #text-principal {
                top: 40%;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
            }

            #text-descriptivo {
                top: 65%;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
            }

            #text-lateral {
                display: none;
            }

            .button-cta {
                width: 90%;
                max-width: 350px;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        .text-overlay img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #000;
        }

        .modal-text {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .modal-btn-confirm {
            background: #FF9500;
            color: white;
        }

        .modal-btn-confirm:hover {
            background: #E68900;
            transform: translateY(-2px);
        }

        .modal-btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .modal-btn-cancel:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="landing">
    <img class="background-img" id="bgImg" alt="background">
    
    <div class="container">
        <!-- Hero Photo -->
        <div class="hero-photo">
            <img src="foto.png" alt="Goddess">
        </div>

        <!-- Text Principal -->
        <div class="text-overlay" id="text-principal">
            <img src="texto_principal.png" alt="Artist Wild Goddess">
        </div>

        <!-- Text Descriptivo -->
        <div class="text-overlay" id="text-descriptivo">
            <img src="texto_descriptivo.png" alt="I create things">
        </div>

        <!-- Text Lateral -->
        <div class="text-overlay" id="text-lateral">
            <img src="texto_lateral.png" alt="You already know">
        </div>

        <!-- Button CTA -->
        <div class="button-cta" id="botonClickeable">
            <img src="boton_inferior.png" alt="Enter My World">
        </div>
    </div>
</div>

<!-- Modal 18+ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <div class="modal-icon">⚠️</div>
        <div class="modal-title">Adult Content</div>
        <div class="modal-text">
            This link contains explicit content.<br>You must be 18+ to continue.
        </div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-confirm" id="btnConfirm">I Am 18+</button>
            <button class="modal-btn modal-btn-cancel" id="btnCancel">Cancel</button>
        </div>
    </div>
</div>

<script>
    // Load background based on screen size
    function loadBackground() {
        const bgImg = document.getElementById('bgImg');
        if (window.innerWidth < 1024) {
            bgImg.src = 'FONDO_MOBILE.png';
        } else {
            bgImg.src = 'FONDO_DESKTOP.png';
        }
    }

    loadBackground();
    window.addEventListener('resize', loadBackground);

    // Modal logic
    const botonClickeable = document.getElementById('botonClickeable');
    const modalOverlay = document.getElementById('modalOverlay');
    const btnConfirm = document.getElementById('btnConfirm');
    const btnCancel = document.getElementById('btnCancel');

    const BOUNCY_LINK = 'https://bouncy.ai/untamedgoddess';

    botonClickeable.addEventListener('click', () => {
        modalOverlay.classList.add('active');
    });

    btnConfirm.addEventListener('click', () => {
        window.location.href = BOUNCY_LINK;
    });

    btnCancel.addEventListener('click', () => {
        modalOverlay.classList.remove('active');
    });

    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
            modalOverlay.classList.remove('active');
        }
    });
</script>

</body>
</html>
