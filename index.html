<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untamed Goddess</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
        }

        /* DESKTOP */
        @media (min-width: 1024px) {
            body {
                background-image: url('FONDO_DESKTOP.png');
                background-size: cover;
                background-attachment: fixed;
            }

            .landing-container {
                min-height: 100vh;
                display: grid;
                grid-template-columns: 1fr 1fr;
                align-items: center;
                gap: 2rem;
                padding: 3rem;
            }

            .left-section {
                display: flex;
                justify-content: center;
            }

            .hero-image {
                width: 90%;
                max-width: 400px;
                height: auto;
            }

            .right-section {
                display: flex;
                flex-direction: column;
                gap: 2rem;
                justify-content: center;
                align-items: flex-start;
                padding-right: 2rem;
            }

            .text-principal {
                width: 100%;
                max-width: 500px;
            }

            .text-descriptivo {
                width: 100%;
                max-width: 500px;
            }

            .text-lateral {
                display: none;
            }

            .button-cta {
                width: 100%;
                max-width: 450px;
                cursor: pointer;
                transition: transform 0.3s ease;
            }

            .button-cta:hover {
                transform: scale(1.05);
            }
        }

        /* MOBILE */
        @media (max-width: 1023px) {
            body {
                background-image: url('FONDO_MOBILE.png');
                background-size: cover;
                background-attachment: scroll;
            }

            .landing-container {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 2rem;
                padding: 2rem 1rem;
            }

            .left-section {
                width: 100%;
                display: flex;
                justify-content: center;
            }

            .hero-image {
                width: 90%;
                max-width: 300px;
                height: auto;
            }

            .right-section {
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 2rem;
                align-items: center;
            }

            .text-principal {
                width: 100%;
                max-width: 100%;
            }

            .text-descriptivo {
                width: 100%;
                max-width: 100%;
            }

            .text-lateral {
                display: none;
            }

            .button-cta {
                width: 100%;
                max-width: 300px;
                cursor: pointer;
                transition: transform 0.3s ease;
            }

            .button-cta:hover {
                transform: scale(1.05);
            }
        }

        .text-principal img,
        .text-descriptivo img,
        .text-lateral img,
        .button-cta img,
        .hero-image {
            display: block;
            width: 100%;
            height: auto;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #000;
        }

        .modal-text {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .modal-btn-confirm {
            background: #FF9500;
            color: white;
        }

        .modal-btn-confirm:hover {
            background: #E68900;
            transform: translateY(-2px);
        }

        .modal-btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .modal-btn-cancel:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="landing-container">
    <!-- Left Section -->
    <div class="left-section">
        <img class="hero-image" src="foto.png" alt="Goddess">
    </div>

    <!-- Right Section -->
    <div class="right-section">
        <div class="text-principal">
            <img src="texto_principal.png" alt="Artist Wild Goddess">
        </div>

        <div class="text-descriptivo">
            <img src="texto_descriptivo.png" alt="I create things">
        </div>

        <div class="button-cta" id="botonClickeable">
            <img src="boton_inferior.png" alt="Enter My World">
        </div>
    </div>
</div>

<!-- Modal 18+ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <div class="modal-icon">⚠️</div>
        <div class="modal-title">Adult Content</div>
        <div class="modal-text">
            This link contains explicit content.<br>You must be 18+ to continue.
        </div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-confirm" id="btnConfirm">I Am 18+</button>
            <button class="modal-btn modal-btn-cancel" id="btnCancel">Cancel</button>
        </div>
    </div>
</div>

<script>
    // Modal logic
    const botonClickeable = document.getElementById('botonClickeable');
    const modalOverlay = document.getElementById('modalOverlay');
    const btnConfirm = document.getElementById('btnConfirm');
    const btnCancel = document.getElementById('btnCancel');

    const BOUNCY_LINK = 'https://bouncy.ai/untamedgoddess';

    botonClickeable.addEventListener('click', () => {
        modalOverlay.classList.add('active');
    });

    btnConfirm.addEventListener('click', () => {
        window.location.href = BOUNCY_LINK;
    });

    btnCancel.addEventListener('click', () => {
        modalOverlay.classList.remove('active');
    });

    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
            modalOverlay.classList.remove('active');
        }
    });
</script>

</body>
</html>
